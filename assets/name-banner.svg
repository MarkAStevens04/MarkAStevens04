<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 340" width="1280" height="340"
     font-family="'Segoe UI', 'Segoe UI Bold', Tahoma, Geneva, Verdana, sans-serif"
     role="img" aria-label="MARK STEVENS">
  <defs>
    <!-- Soft-edged band: black -> white -> black across the rect width, so the
         sweep fades in and out instead of a hard line -->
    <linearGradient id="feather" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#000000"/>
      <stop offset="0.5"  stop-color="#ffffff"/>
      <stop offset="1"    stop-color="#000000"/>
    </linearGradient>

    <!-- The moving mask. The diagonal band slides left->right, then rests
         off-screen so the sweep only fires every few seconds. -->
    <mask id="sweep" maskUnits="userSpaceOnUse" x="0" y="0" width="1280" height="340">
      <rect x="0" y="0" width="1280" height="340" fill="#000000"/>
      <g transform="rotate(-18 640 170)">
        <rect y="-380" width="260" height="1080" fill="url(#feather)">
          <animate attributeName="x"
                   values="-640;1540;1540"
                   keyTimes="0;0.62;1"
                   dur="10s"
                   calcMode="spline"
                   keySplines="0.45 0 0.2 1; 0 0 1 1"
                   repeatCount="indefinite"/>
        </rect>
      </g>
    </mask>
  </defs>

  <!-- Background plate -->
  <rect x="0" y="0" width="1280" height="340" rx="22" fill="#0d1117"/>

  <!-- Chromatic-aberration layers: only visible inside the moving band.
       Red shifted left, cyan shifted right, so colored fringes peek out
       around the white text as the sweep passes over it. -->
  <g mask="url(#sweep)">
    <text x="640" y="238" text-anchor="middle" textLength="1240" lengthAdjust="spacingAndGlyphs"
          font-weight="800" font-size="250" fill="#ff2d4d" opacity="0.9"
          transform="translate(-14,0)">MARK STEVENS</text>
    <text x="640" y="238" text-anchor="middle" textLength="1240" lengthAdjust="spacingAndGlyphs"
          font-weight="800" font-size="250" fill="#1ff0ff" opacity="0.9"
          transform="translate(14,0)">MARK STEVENS</text>
  </g>

  <!-- Solid white name on top, stretched to nearly the full box width -->
  <text x="640" y="238" text-anchor="middle" textLength="1240" lengthAdjust="spacingAndGlyphs"
        font-weight="800" font-size="250" fill="#ffffff">MARK STEVENS</text>

  <!-- Discipline labels, aligned to the left / center / right of the name -->
  <g font-size="25" font-weight="400" letter-spacing="1" fill="#9aa4b0">
    <text x="22"   y="302" text-anchor="start">Generative Chemistry</text>
    <text x="640"  y="302" text-anchor="middle">Protein Design</text>
    <text x="1258" y="302" text-anchor="end">Experimental Validation</text>
  </g>
</svg>
