<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 380" width="1280" height="380" font-family="&#39;Arial Black&#39;, &#39;Helvetica Neue&#39;, Helvetica, Arial, sans-serif" role="img" aria-label="Mark Stevens — generative chemistry, protein design, experimental validation">
  <defs>
    <linearGradient id="sweep" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="300" y2="300" spreadMethod="pad">
      <stop offset="0" stop-color="#000000"></stop>
      <stop offset="0.40" stop-color="#000000"></stop>
      <stop offset="0.50" stop-color="#ffffff"></stop>
      <stop offset="0.60" stop-color="#000000"></stop>
      <stop offset="1" stop-color="#000000"></stop>
      
    </linearGradient>
    <mask id="band" maskUnits="userSpaceOnUse" x="0" y="0" width="1280" height="380">
