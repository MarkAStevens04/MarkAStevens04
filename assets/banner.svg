    <text x="640" y="214" text-anchor="middle" textLength="1120" lengthAdjust="spacingAndGlyphs" font-weight="900" font-size="190" fill="#1ff0ff" transform="translate(9,5)">MARK STEVENS</text>
  </g>
  <text x="640" y="214" text-anchor="middle" textLength="1120" lengthAdjust="spacingAndGlyphs" font-weight="900" font-size="190" fill="#ffffff">MARK STEVENS</text>
  <line x1="80" y1="254" x2="1200" y2="254" stroke="#ff7a33" stroke-width="3"></line>
  <g font-weight="600" font-size="26" letter-spacing="1.2" fill="#ff7a33">
    <text x="80" y="316" text-anchor="start">generative chemistry</text>
