name: Build README

# Regenerates the Featured Projects timeline (assets/projects-timeline.svg) and
# the README section from projects.json, then commits the result back to the repo.

on:
  push:
    branches: [main]
    paths:
      - projects.json
      - skills.json
      - tools/build_readme.py
      - .github/workflows/readme.yml
  workflow_dispatch:   # lets you run it manually from the Actions tab

permissions:
  contents: write

# Avoid overlapping runs racing to push.
concurrency:
  group: build-readme
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Regenerate timeline + README
        run: python tools/build_readme.py   # standard library only, no install step

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/projects-timeline.svg
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore: regenerate projects timeline [skip ci]"
            git push
          fi
